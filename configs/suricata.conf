# ==============================================================================
# Suricata IDS Filter for Fail2ban
# ------------------------------------------------------------------------------
# Purpose: Parses Suricata fast.log to identify malicious traffic patterns.
# Logic:
#   - Uses datepattern to handle Suricata's microsecond precision.
#   - Uses a non-capturing group to make the protocol block optional.
#   - Isolates the <HOST> variable for UFW to process.
# ==============================================================================

[Definition]
# Explicitly handles the Month/Day/Year-Hour:Minute:Second.Microseconds structure
datepattern = ^%%m/%%d/%%Y-%%H:%%M:%%S\.%%f

# Highly resilient pattern isolating the optional protocol, source IP, and outbound arrow
failregex = (?:\{[^}]+\}\s+)?<HOST>(?::\d+)?\s+->

ignoreregex =
